<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <title>Alura Books</title>
</head>
<body>
  
  <header class="cabecalho">

    <div class="container container__alinhamento">
      
      <input type="checkbox" id="menu" class="container_botao">
      <label for="menu">
        <span class="cabecalho__menu-hamburguer"></span>
      </label>
      <ul class="lista-menu">
        <li class="lista-menu__titulo">Categorias</li>
        <li class="lista-menu__item"><a href="#" class="lista-menu__link">PROGRAMAÇÃO</a></li>
        <li class="lista-menu__item"><a href="#" class="lista-menu__link">FRONT-END</a></li>
        <li class="lista-menu__item"><a href="#" class="lista-menu__link">INFRAESTRUTURA</a></li>
        <li class="lista-menu__item"><a href="#" class="lista-menu__link">BUSINESS</a></li>
        <li class="lista-menu__item"><a href="#" class="lista-menu__link">DESIGN & UX</a></li>
      </ul>
      
      
      <img src="images/logo.svg" alt="Logo da Alura Books">
    </div>
    
    <div class="container">
      <a href="#"><img src="images/favoritos.svg" alt="Meus favoritos" class="container__imagem"></a>
      <a href="#"><img src="images/compras.svg" alt="Carrinho de compras" class="container__imagem"></a>
      <a href="#"><img src="images/usuario.svg" alt="Meu perfil" class="container__imagem"></a>
    </div>
  </header>

  <section class="banner">
    <h2 class="banner__titulo">Já sabe por onde começar?</h2>
    <p class="banner__texto">Encontre em nossa estante o que precisa para seu desenvolvimento!</p>
    <input type="search" name="pesquisa_livro" id="pesquisa_livro" class="banner__pesquisa" placeholder="Qual será sua próxima leitura?">
  </section>   


 
  

  
</body>
</html>
